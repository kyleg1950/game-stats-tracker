<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Game Stats Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <section id="setup-screen" class="card">
            <h1>Game Setup</h1>
            <p class="muted">Enter your team and add up to 10 players to begin tracking stats.</p>

            <div class="field">
                <label for="team-name">Team Name</label>
                <input type="text" id="team-name" placeholder="e.g. Westside Hawks">
            </div>

            <div class="roster-header">
                <h2>Roster</h2>
                <span id="roster-count" class="muted-inline">0 / 10 players</span>
            </div>

            <div id="roster-list" class="roster-list"></div>

            <button id="add-player" class="button button-secondary" type="button">+ Add Player</button>

            <button id="start-game" class="button button-primary">Start Game</button>
        </section>

        <section id="game-screen" class="card" style="display:none;">
            <header class="game-header">
                <h1 id="game-title">Game</h1>
                <button id="end-game" class="button button-ghost" type="button">End Game</button>
            </header>

            <div id="players-board" class="players-board"></div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
