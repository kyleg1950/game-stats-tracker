<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Game Stats Tracker</title>
</head>
<body>
    <header>
        <h1>Welcome to Game Stats Tracker</h1>
    </header>
    <main>
        <section id="stats">
            <h2>Your Game Stats</h2>
            <!-- Game stats will be displayed here -->
        </section>
        <section id="form">
            <h2>Update Your Stats</h2>
            <form id="statsForm">
                <input type="text" id="gameName" placeholder="Game Name" required>
                <input type="number" id="hoursPlayed" placeholder="Hours Played" required>
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
