<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Game Stats Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="setup-screen">
        <h1>Setup Screen</h1>
        <label for="team-name">Team Name:</label>
        <input type="text" id="team-name" placeholder="Enter team name">
        <button id="start-game">Start Game</button>
        <div class="player-card">
            <h2>Player Card</h2>
            <label for="player-name">Player Name:</label>
            <input type="text" id="player-name" placeholder="Enter player name">
            <label for="player-number">Player Number:</label>
            <input type="number" id="player-number" placeholder="Enter player number">
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <h1>Game Screen</h1>
        <div id="details-panel">
            <h2>Stat Tracking</h2>
            <button id="points-button">+1 Point</button>
            <button id="rebound-button">+1 Rebound</button>
            <button id="assist-button">+1 Assist</button>
            <button id="foul-button">+1 Foul</button>
            <button id="steal-button">+1 Steal</button>
        </div>
        <div id="stats-display">
            <h3>Current Stats</h3>
            <p id="points">Points: 0</p>
            <p id="rebounds">Rebounds: 0</p>
            <p id="assists">Assists: 0</p>
            <p id="fouls">Fouls: 0</p>
            <p id="steals">Steals: 0</p>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
